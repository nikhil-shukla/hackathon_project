name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Example 1: Passing the secret to a Docker run command (for testing in CI)
      - name: Build Docker Image
        run: |
          cd backend
          docker build -t aegis-backend .

      - name: Run Docker Image with GitHub Secret
        # This injects the GitHub secret as an environment variable into the running container
        run: |
          docker run -d -p 8080:8080 \
            --env GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            aegis-backend

